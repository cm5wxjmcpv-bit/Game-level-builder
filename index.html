<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2D Level Builder</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <h1>2D Level Builder (v2)</h1>
    <p>Create maps for the builder and export clean engine-ready JSON.</p>
  </header>

  <main class="layout">
    <aside class="panel controls-panel">
      <h2>Map Setup</h2>
      <div class="actions">
        <label class="field-label" for="mapTypeSelect">Map Type</label>
        <select id="mapTypeSelect" class="text-input">
          <option value="level">Level</option>
          <option value="town">Town</option>
        </select>

        <label class="field-label" for="mapIdInput">Map ID</label>
        <input id="mapIdInput" class="text-input" type="text" value="level_001" />

        <label class="field-label" for="mapNameInput">Map Name</label>
        <input id="mapNameInput" class="text-input" type="text" value="Starter Level" />

        <div class="size-row">
          <div>
            <label class="field-label" for="mapWidthInput">Width</label>
            <input id="mapWidthInput" class="text-input" type="number" min="1" max="200" value="30" />
          </div>
          <div>
            <label class="field-label" for="mapHeightInput">Height</label>
            <input id="mapHeightInput" class="text-input" type="number" min="1" max="200" value="30" />
          </div>
        </div>
        <button id="applySizeBtn" type="button" class="secondary-btn">Apply Map Size</button>
      </div>

      <h2>Tiles & Tools</h2>
      <div id="palette" class="palette" aria-label="Tile palette"></div>

      <div class="tool-row tool-grid">
        <button id="paintToolBtn" type="button" class="secondary-btn">Paint Tool</button>
        <button id="fillToolBtn" type="button" class="secondary-btn">Fill Tool</button>
        <button id="eraserBtn" type="button" class="secondary-btn">Eraser (Tile 0)</button>
      </div>

      <h2>Map Actions</h2>
      <div class="actions">
        <button id="exportBtn" type="button">Export Raw JSON</button>
        <button id="exportGameBtn" type="button">Export Engine JSON</button>
        <label for="importInput" class="file-label">Import JSON</label>
        <input id="importInput" type="file" accept="application/json" />
        <button id="clearBtn" type="button" class="danger-btn">Clear Map</button>
        <button id="openViewerBtn" type="button" class="secondary-btn">Open Viewer (Preview Current Map)</button>
      </div>

      <div class="status-box">
        <p><strong>Map:</strong> <span id="mapTypeLabel">level</span> (<span id="mapIdLabel">level_001</span>)</p>
        <p><strong>Selected:</strong> <span id="selectedToolLabel">None</span></p>
        <p><strong>Tool:</strong> <span id="activeToolLabel">Paint</span></p>
        <p><strong>Grid Size:</strong> <span id="gridSizeLabel">0</span> x <span id="gridSizeLabel2">0</span></p>
        <p id="message" class="message" role="status" aria-live="polite"></p>
      </div>

      <div class="legend">
        <h3>Tile/Object IDs</h3>
        <ul id="tileLegend"></ul>
      </div>
    </aside>

    <section class="panel editor-panel">
      <h2>Editor Grid</h2>
      <div id="gridContainer" class="grid-container" aria-label="Level editor grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
